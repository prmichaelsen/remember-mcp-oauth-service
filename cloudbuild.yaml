steps:
  # Build Docker image using Dockerfile (same as local)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/remember-mcp-oauth-service:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/remember-mcp-oauth-service:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/remember-mcp-oauth-service:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/remember-mcp-oauth-service:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'remember-mcp-oauth-service'
      - '--image=gcr.io/$PROJECT_ID/remember-mcp-oauth-service:$COMMIT_SHA'
      - '--platform=managed'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=300s'
      - '--set-env-vars=NODE_ENV=production,AGENTBASE_URL=https://agentbase.me,BASE_URL=https://remember-mcp-oauth-service-dit6gawkbq-uc.a.run.app'
      - '--update-secrets=WEAVIATE_REST_URL=remember-weaviate-rest-url:latest,WEAVIATE_API_KEY=remember-weaviate-api-key:latest,FIREBASE_ADMIN_SERVICE_ACCOUNT_KEY=remember-firebase-admin-service-account-key:latest,FIREBASE_PROJECT_ID=remember-firebase-project-id:latest,OPENAI_EMBEDDINGS_API_KEY=remember-openai-embeddings-api-key:latest'

images:
  - 'gcr.io/$PROJECT_ID/remember-mcp-oauth-service:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/remember-mcp-oauth-service:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
